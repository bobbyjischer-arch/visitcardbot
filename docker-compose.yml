version: '3.8'

services:
  core:
    build: .
    ports:
      - "8000:8000"
    environment:
      - TELEGRAM_TOKEN=${TELEGRAM_TOKEN}
      - SECRET_CODE=${SECRET_CODE:-0000}
    volumes:
      - ./data:/app/data
    restart: unless-stopped
    networks:
      - orion-network

  bot:
    build: .
    command: python bot.py
    environment:
      - TELEGRAM_TOKEN=${TELEGRAM_TOKEN}
      - CORE_URL=http://core:8000
    depends_on:
      - core
    restart: unless-stopped
    networks:
      - orion-network

networks:
  orion-network:
    driver: bridge

volumes:
  data:
